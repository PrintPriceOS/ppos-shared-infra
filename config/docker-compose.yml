version: '3.8'

services:
  # Infrastructure
  mysql:
    image: mysql:8.0
    container_name: ppos-mysql
    environment:
      MYSQL_DATABASE: preflight_
      MYSQL_ROOT_PASSWORD: ppos_root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./PrintPricePro_Preflight-master/scripts/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7.0-alpine
    container_name: ppos-redis
    ports:
      - "6379:6379"

  # Application Services
  preflight-engine:
    build: 
      context: ./ppos-preflight-engine
      dockerfile: Dockerfile
    container_name: ppos-preflight-engine
    environment:
      - LOG_LEVEL=info
      - GS_COMMAND=gs
    depends_on:
      - redis

  preflight-service:
    build:
      context: ./ppos-preflight-service
      dockerfile: Dockerfile
    container_name: ppos-preflight-service
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:ppos_root_pass@mysql:3306/preflight_
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mysql
      - redis
      - preflight-engine

  legacy-app:
    build:
      context: ./PrintPricePro_Preflight-master
      dockerfile: Dockerfile
    container_name: ppos-legacy-app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=mysql://root:ppos_root_pass@mysql:3306/preflight_
      - REDIS_URL=redis://redis:6379
      - PPOS_PREFLIGHT_SERVICE_URL=http://preflight-service:3000
      - ADMIN_API_KEY=ppos-dev-token-2026
    depends_on:
      - mysql
      - redis
      - preflight-service

volumes:
  mysql_data:
