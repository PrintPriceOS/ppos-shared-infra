version: "3.8"

services:

  ppos-preflight-engine:
    build:
      context: ../
      dockerfile: ppos-preflight-engine/Dockerfile
    image: ppos/preflight-engine:production
    container_name: ppos-preflight-engine
    restart: unless-stopped
    environment:
      GS_COMMAND: gs
      PPOS_TEMP_DIR: /tmp/ppos-preflight
    networks:
      - ppos-network

  ppos-preflight-service:
    build:
      context: ../
      dockerfile: ppos-preflight-service/Dockerfile
    image: ppos/preflight-service:production
    container_name: ppos-preflight-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PPOS_SERVICE_PORT: 8001
      DATABASE_URL: mysql://ppos_user:ppos_pass@ppos-mysql:3306/printprice_os
      MYSQL_HOST: ppos-mysql
      MYSQL_USER: ppos_user
      MYSQL_PASSWORD: ppos_pass
      MYSQL_DATABASE: printprice_os
      REDIS_HOST: ppos-redis
      REDIS_PORT: 6379
      ADMIN_API_KEY: ${ADMIN_API_KEY:-ppos-staging-token-2026}
    volumes:
      - ppos-uploads:/tmp/ppos-preflight
    networks:
      - ppos-network

  ppos-preflight-worker:
    build:
      context: ../
      dockerfile: ppos-preflight-worker/Dockerfile
    image: ppos/preflight-worker:production
    container_name: ppos-preflight-worker
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      HEALTH_PORT: 8002
      DATABASE_URL: mysql://ppos_user:ppos_pass@ppos-mysql:3306/printprice_os
      MYSQL_HOST: ppos-mysql
      MYSQL_USER: ppos_user
      MYSQL_PASSWORD: ppos_pass
      MYSQL_DATABASE: printprice_os
      REDIS_HOST: ppos-redis
      REDIS_PORT: 6379
    volumes:
      - ppos-uploads:/tmp/ppos-preflight
    networks:
      - ppos-network

volumes:
  ppos-uploads:

networks:
  ppos-network:
    external: true

