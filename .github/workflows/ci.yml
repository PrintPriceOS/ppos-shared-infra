name: PPOS Shared Infra CI

on:
  push:
    branches: [ main, v1.9.0, release/* ]
  pull_request:
    branches: [ main, v1.9.0 ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    - name: Install dependencies
      run: npm install
    - name: Verify Index
      run: node -e "require('./index')"
