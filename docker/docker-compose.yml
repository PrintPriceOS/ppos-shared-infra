version: "3.8"

services:
  # Base de Datos Canónica (Job Registry, Inventory, Audit)
  mysql:
    image: mysql:8.0
    container_name: ppos-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=printprice_os
      - MYSQL_USER=ppos_user
      - MYSQL_PASSWORD=ppos_pass
    volumes:
      - ../mysql/init:/docker-entrypoint-initdb.d
    networks:
      - ppos-network

  # Orquestador de Sagas y Workflows
  temporal:
    image: temporalio/admin-tools:latest
    container_name: ppos-temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - mysql
    ports:
      - "7233:7233" # gRPC
      - "8233:8233" # UI
    networks:
      - ppos-network

  # Message Broker (Event Bus)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ppos-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    networks:
      - ppos-network

  # Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: ppos-redis
    ports:
      - "6379:6379"
    networks:
      - ppos-network

  # Observabilidad y Telemetría
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: ppos-otel
    volumes:
      - ../observability/otel-config.yaml:/etc/otel-collector.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      - ppos-network

networks:
  ppos-network:
    driver: bridge
